<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: light;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #dbeafe 50%, #f0f9ff 100%);
      color: #0f172a;
    }

    .card {
      width: min(92vw, 520px);
      padding: 48px 36px;
      text-align: center;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(8px);
      box-shadow: 0 12px 40px rgba(30, 41, 59, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.9);
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.03em;
    }

    p {
      margin: 0 0 28px;
      font-size: 1.05rem;
      color: #334155;
    }

    .btn {
      display: inline-block;
      padding: 12px 26px;
      font-size: 1rem;
      font-weight: 600;
      color: #ffffff;
      text-decoration: none;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      box-shadow: 0 8px 22px rgba(239, 68, 68, 0.45);
      animation: pulseGlow 2s ease-in-out infinite;
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.03);
      filter: brightness(1.08);
      box-shadow: 0 14px 30px rgba(220, 38, 38, 0.45);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow: 0 8px 22px rgba(239, 68, 68, 0.35);
      }
      50% {
        box-shadow: 0 12px 30px rgba(239, 68, 68, 0.6);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello World</h1>
    <p>Welcome to your new beautiful page.</p>
    <button class="btn" id="clickBtn" type="button">Get Started</button>
  </main>
  <script>
    const clickBtn = document.getElementById("clickBtn");
    let clickCount = 0;

    clickBtn.addEventListener("click", () => {
      clickCount += 1;
      const label = clickCount === 1 ? "time" : "times";
      clickBtn.textContent = `Clicked ${clickCount} ${label}`;
    });
  </script>
</body>
</html>
